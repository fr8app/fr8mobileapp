// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        minSdkVersion = 24 // change this one from 16 to 21
        buildToolsVersion = "29.0.2"
//        minSdkVersion = 16
        compileSdkVersion = 31
        targetSdkVersion = 30
        supportLibVersion = "29.0.2"
        kotlinVersion = "1.6.0" // add this line
        googlePlayServicesVersion = "11+"

    }
    repositories {
        google()
        jcenter()
    }
    dependencies {
//        implementation "androidx.core:core-ktx:1.5.0"
        classpath("com.android.tools.build:gradle:4.1.3")
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion" // add this line
        classpath 'com.google.gms:google-services:4.3.5'
        // NOTE: Do not place your application dependencies here; they belong
        // in the individual module build.gradle files
    }
}

def REACT_NATIVE_VERSION = new File(['node', '--print',"JSON.parse(require('fs').readFileSync(require.resolve('react-native/package.json'), 'utf-8')).version"].execute(null, rootDir).text.trim())


allprojects {
    repositories {
        mavenCentral()
        mavenLocal()
        maven {
            // All of React Native (JS, Obj-C sources, Android binaries) is installed from npm
            url("$rootDir/../node_modules/react-native/android")
        }
        maven {
            // Android JSC is installed from npm
            url("$rootDir/../node_modules/jsc-android/dist")
        }
        maven { url "http://tokbox.bintray.com/maven" }
//        maven {
//            // Required for react-native-background-geolocation
//            url("${project(':react-native-background-geolocation').projectDir}/libs")
//        }
        maven {
            // Required for react-native-background-fetch
            url("${project(':react-native-background-fetch').projectDir}/libs")
        }
        google()
        jcenter()
        maven { url 'https://jitpack.io' }
    }
    configurations.all {
       resolutionStrategy {
             // Remove this override in 0.65+, as a proper fix is included in react-native itself.
             force "com.facebook.react:react-native:" + REACT_NATIVE_VERSION
            }
        }
}
